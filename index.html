<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Art Festival - Pikachu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background -->
  <div class="background" aria-hidden="true">
    <div class="gradient-layer"></div>

    <div class="ray ray-1"></div>
    <div class="ray ray-2"></div>
    <div class="ray ray-3"></div>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <div class="particles">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <main class="scene">

    <div class="sparkles" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span>
    </div>

    <figure
      class="pikachu"
      aria-label="Hand-coded CSS illustration of Pikachu"
      role="img"
    >

      <div class="aura"></div>

      <!-- Tail -->
      <div class="tail">
        <div class="tail-segment s1"></div>
        <div class="tail-segment s2"></div>
        <div class="tail-segment s3"></div>
      </div>

      <!-- Body -->
      <div class="body">
        <div class="belly-highlight"></div>

        <div class="arm left-arm"></div>
        <div class="arm right-arm"></div>

        <div class="leg left-leg"></div>
        <div class="leg right-leg"></div>
      </div>

      <!-- Head -->
      <div class="head">

        <div class="ear left-ear"></div>
        <div class="ear right-ear"></div>

        <div class="face-highlight"></div>

        <div class="eye left-eye">
          <span class="reflection"></span>
        </div>

        <div class="eye right-eye">
          <span class="reflection"></span>
        </div>

        <div class="nose"></div>

        <div class="mouth">
          <span class="smile left"></span>
          <span class="smile right"></span>
        </div>

        <div class="cheek left-cheek"></div>
        <div class="cheek right-cheek"></div>

      </div>

      <div class="ground-shadow"></div>

    </figure>

  </main>

</body>
</html>
